  <!-- Acoustic guitar body: figure-8 silhouette -->
  <path fill="white" d="M14 11L18 11C22 11 24 13 24 16C24 18.5 22 20 20 20.5C23 21.5 25 24 25 26.5C25 29.5 21 31 16 31C11 31 7 29.5 7 26.5C7 24 9 21.5 12 20.5C10 20 8 18.5 8 16C8 13 10 11 14 11Z"/>
  <!-- Sound hole -->
  <circle cx="16" cy="17" r="2.5" fill="#863bff"/>
</svg>
