name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
      - run: npm run build

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          BODY=""

          FEATS=$(git log --oneline --no-merges $RANGE | grep -E "^[a-f0-9]+ feat" | sed 's/^[a-f0-9]* feat[:(]/- /' | sed 's/):/:/; s/: /: /' || true)
          if [ -n "$FEATS" ]; then
            BODY="${BODY}## New Features"$'\n'"${FEATS}"$'\n\n'
          fi

          FIXES=$(git log --oneline --no-merges $RANGE | grep -E "^[a-f0-9]+ fix" | sed 's/^[a-f0-9]* fix[:(]/- /' | sed 's/):/:/; s/: /: /' || true)
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes"$'\n'"${FIXES}"$'\n\n'
          fi

          REFACTORS=$(git log --oneline --no-merges $RANGE | grep -E "^[a-f0-9]+ refactor" | sed 's/^[a-f0-9]* refactor[:(]/- /' | sed 's/):/:/; s/: /: /' || true)
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}## Refactors"$'\n'"${REFACTORS}"$'\n\n'
          fi

          MAINT=$(git log --oneline --no-merges $RANGE | grep -E "^[a-f0-9]+ (chore|ci|test|docs|style)" | sed 's/^[a-f0-9]* [a-z]*[:(]/- /' | sed 's/):/:/; s/: /: /' || true)
          if [ -n "$MAINT" ]; then
            BODY="${BODY}## Maintenance"$'\n'"${MAINT}"$'\n\n'
          fi

          if [ -z "$BODY" ]; then
            BODY="No notable changes."
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          name: FretFlow ${{ github.ref_name }}
