name: Test Coverage Report

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: Coverage Report

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test -- --coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov
          fail_ci_if_error: false
          verbose: true

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check coverage thresholds
        run: |
          echo "📊 Test Coverage Summary"
          echo "========================================"

          if [ -f "coverage/coverage-summary.json" ]; then
            # Extract coverage percentages
            STATEMENTS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json', 'utf8')).total.statements.pct)")
            BRANCHES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json', 'utf8')).total.branches.pct)")
            FUNCTIONS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json', 'utf8')).total.functions.pct)")
            LINES=$(node -e "console.log(JSON.parse(require('fs').readFileSync('./coverage/coverage-summary.json', 'utf8')).total.lines.pct)")

            echo "Statements:  ${STATEMENTS}%"
            echo "Branches:    ${BRANCHES}%"
            echo "Functions:   ${FUNCTIONS}%"
            echo "Lines:       ${LINES}%"
            echo ""

            # Define minimum thresholds
            MIN_THRESHOLD=70

            if (( $(echo "$STATEMENTS < $MIN_THRESHOLD" | bc -l) )); then
              echo "⚠️  Statements coverage below ${MIN_THRESHOLD}%"
            fi

            if (( $(echo "$LINES < $MIN_THRESHOLD" | bc -l) )); then
              echo "⚠️  Lines coverage below ${MIN_THRESHOLD}%"
            fi

            echo ""
            echo "✅ Coverage check complete"
          else
            echo "❌ Coverage report not found"
          fi

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate HTML coverage report
        if: always()
        run: |
          echo "Coverage report generated at: coverage/index.html"

  quality-check:
    runs-on: ubuntu-latest
    name: Quality Checks
    needs: coverage
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run build
        continue-on-error: true

      - name: List test files
        run: |
          echo "📋 Test Files Summary"
          echo "========================================"
          find src/__tests__ -name "*.test.*" -o -name "*.spec.*" | sort
          echo ""
          echo "Test files count: $(find src/__tests__ -name "*.test.*" -o -name "*.spec.*" | wc -l)"
