name: Auto Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    name: Tag and bump version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          create_annotated_tag: true

      - name: Trigger deploy workflow
        if: steps.tag.outputs.new_tag
        run: gh workflow run deploy.yml --ref ${{ steps.tag.outputs.new_tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version bump PR
        if: steps.tag.outputs.new_tag
        run: |
          NEW_VERSION="${{ steps.tag.outputs.new_version }}"
          BRANCH="chore/bump-v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          npm version "$NEW_VERSION" --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to v${NEW_VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): bump version to v${NEW_VERSION}" \
            --body "Auto-generated version bump after tagging v${NEW_VERSION}. Safe to auto-merge." \
            --label "release"

          # Set the required Quality Gate status on the bump commit.
          # PRs created with GITHUB_TOKEN don't trigger other workflows,
          # so we set the status directly for this version-bump-only change.
          COMMIT_SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$COMMIT_SHA \
            --method POST \
            -f state=success \
            -f context="Quality Gate" \
            -f description="Skipped — version bump only"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
