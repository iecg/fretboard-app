name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    name: Compute and push version tag
    runs-on: ubuntu-latest

    # Skip if the commit was generated by this workflow or explicitly opted out
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version tag
        id: version
        run: |
          # ── 1. Find the most recent semver tag ──────────────────────────────
          LAST_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # ── Bootstrap: no tags yet ─────────────────────────────────────
            # Read the version straight from package.json and tag it as-is.
            PKG_VERSION=$(node -p "require('./package.json').version")
            NEXT_TAG="v${PKG_VERSION}"
            echo "Bootstrap run: no existing tags found. Using package.json version: ${NEXT_TAG}"
            echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last tag: ${LAST_TAG}"

          # ── 2. Collect commits since the last tag ────────────────────────
          COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)

          if [ -z "$COMMITS" ]; then
            echo "No commits since ${LAST_TAG}. Nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since ${LAST_TAG}:"
          echo "${COMMITS}"

          # ── 3. Determine bump type ───────────────────────────────────────
          # Check for breaking changes first (highest precedence).
          BREAKING=$(echo "${COMMITS}" | grep -E "^[a-z]+(\([^)]+\))?!:|^BREAKING CHANGE:" || true)
          FEAT=$(echo "${COMMITS}" | grep -E "^feat(\([^)]+\))?:" || true)

          if [ -n "$BREAKING" ]; then
            BUMP="major"
          elif [ -n "$FEAT" ]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Bump type: ${BUMP}"

          # ── 4. Parse and increment the version ──────────────────────────
          VERSION="${LAST_TAG#v}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)
          PATCH=$(echo "${VERSION}" | cut -d. -f3)

          case "${BUMP}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: ${NEXT_TAG}"
          echo "next_tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        if: steps.version.outputs.skip != 'true'
        run: |
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"
          if git ls-remote --tags origin "refs/tags/${NEXT_TAG}" | grep -q "${NEXT_TAG}"; then
            echo "Tag ${NEXT_TAG} already exists on remote (race condition — skipping)."
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push annotated tag
        if: |
          steps.version.outputs.skip != 'true' &&
          steps.tag_check.outputs.already_exists != 'true'
        run: |
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${NEXT_TAG}" -m "Release ${NEXT_TAG}"

          # Push the tag; handle the race condition where another run beat us to it.
          if git push origin "${NEXT_TAG}"; then
            echo "Successfully pushed tag ${NEXT_TAG}"
          else
            echo "Push failed — tag ${NEXT_TAG} was already pushed by a concurrent run. Skipping gracefully."
            git tag -d "${NEXT_TAG}"
            exit 0
          fi
