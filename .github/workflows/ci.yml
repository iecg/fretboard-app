name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.husky/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!LICENSE'
              - '!.husky/**'

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  e2e:
    name: Responsive E2E
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production E2E tests
        run: npx playwright test --config=playwright.config.production.ts

      - name: Archive Playwright results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm run test:visual:ci

      - name: Archive Playwright visual results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-visual-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [changes, test, e2e, visual, build]
    if: always()
    steps:
      - name: Check results
        run: |
          FAIL=0
          check() {
            case "$2" in
              success|skipped) ;;
              *) echo "❌ $1 failed ($2)"; FAIL=1 ;;
            esac
          }
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "❌ Changes detector failed (${{ needs.changes.result }})"
            FAIL=1
          fi
          check "Tests" "${{ needs.test.result }}"
          check "E2E"   "${{ needs.e2e.result }}"
          check "Visual" "${{ needs.visual.result }}"
          check "Build" "${{ needs.build.result }}"
          [ "$FAIL" -eq 0 ] && echo "✅ All required checks passed (or skipped for docs-only)"
          exit $FAIL

      - name: PR status comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          PR_BRANCH: ${{ github.head_ref }}
        with:
          script: |
            const r = s => s === 'success' ? '✅ Pass' : s === 'skipped' ? '⏭ Skipped' : '❌ Fail';
            const branch = process.env.PR_BRANCH;
            const body = [
              '## CI Status',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Tests | ${r('${{ needs.test.result }}')} |`,
              `| E2E   | ${r('${{ needs.e2e.result }}')} |`,
              `| Visual | ${r('${{ needs.visual.result }}')} |`,
              `| Build | ${r('${{ needs.build.result }}')} |`,
              '',
              `**Branch**: \`${branch}\`  **Commit**: ${context.payload.pull_request.head.sha.substring(0, 7)}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('## CI Status'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
