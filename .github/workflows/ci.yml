name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test -- --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.node-version == '24'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            coverage/
            test-results/
          retention-days: 30

  responsive-e2e:
    name: Responsive E2E
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run responsive smoke tests
        run: npm run test:e2e

      - name: Archive Playwright results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 5

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, responsive-e2e, build]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ Tests passed"

      - name: Check build results
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Check responsive E2E results
        run: |
          if [ "${{ needs.responsive-e2e.result }}" != "success" ]; then
            echo "❌ Responsive E2E failed"
            exit 1
          fi
          echo "✅ Responsive E2E passed"

      - name: PR Status Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ needs.test.result }}' === 'success' ? '✅ Pass' : '❌ Fail';
            const e2eResult = '${{ needs.responsive-e2e.result }}' === 'success' ? '✅ Pass' : '❌ Fail';
            const buildResult = '${{ needs.build.result }}' === 'success' ? '✅ Pass' : '❌ Fail';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI/CD Pipeline Status

            | Check | Status |
            |-------|--------|
            | Tests | ${testResult} |
            | Responsive E2E | ${e2eResult} |
            | Build | ${buildResult} |

            **Branch**: \`${context.payload.pull_request.head.ref}\`
            **Commit**: ${context.payload.pull_request.head.sha.substring(0, 7)}`
            })
