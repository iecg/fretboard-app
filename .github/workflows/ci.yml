name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.husky/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.husky/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e:
    name: Responsive E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run production E2E tests
        run: npm run test:e2e:production

      - name: Archive Playwright results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, e2e, build]
    if: always()
    steps:
      - name: Check results
        run: |
          FAIL=0
          [ "${{ needs.test.result }}"  != "success" ] && echo "❌ Tests failed" && FAIL=1
          [ "${{ needs.e2e.result }}"   != "success" ] && echo "❌ E2E failed"   && FAIL=1
          [ "${{ needs.build.result }}" != "success" ] && echo "❌ Build failed" && FAIL=1
          [ "$FAIL" -eq 0 ] && echo "✅ All checks passed"
          exit $FAIL

      - name: PR status comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_BRANCH: ${{ github.head_ref }}
        with:
          script: |
            const r = s => s === 'success' ? '✅ Pass' : '❌ Fail';
            const branch = process.env.PR_BRANCH;
            const body = [
              '## CI Status',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Tests | ${r('${{ needs.test.result }}')} |`,
              `| E2E   | ${r('${{ needs.e2e.result }}')} |`,
              `| Build | ${r('${{ needs.build.result }}')} |`,
              '',
              `**Branch**: \`${branch}\`  **Commit**: ${context.payload.pull_request.head.sha.substring(0, 7)}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('## CI Status'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
