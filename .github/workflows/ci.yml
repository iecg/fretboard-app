name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr:
    name: PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title (conventional commit format)
        env:
          TITLE: ${{ github.event.pull_request.title }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "ℹ️ Draft PR — skipping title validation until ready for review"
            exit 0
          fi
          if [[ ! "$TITLE" =~ ^(feat|fix|chore|refactor|docs|test|style|perf|ci|build|revert)(\([^()]+\))?\!?:\ .+ ]]; then
            echo "❌ PR title must follow conventional commits: type(scope): description"
            echo "   Examples: feat: add capo support"
            echo "             fix(fretboard): off-by-one on fret 0 highlight"
            echo "   Tip: draft PRs may keep a temporary title until ready for review"
            exit 1
          fi
          description="${TITLE#*: }"
          if [ ${#description} -gt 72 ]; then
            echo "❌ PR subject must be ≤ 72 chars (got ${#description})"
            exit 1
          fi
          if [[ "${description: -1}" == "." ]]; then
            echo "❌ PR subject must not end with a period"
            exit 1
          fi
          echo "✅ PR title OK"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  e2e:
    name: Responsive E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run responsive smoke tests
        run: npm run test:e2e

      - name: Archive Playwright results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [test, e2e, build]
    if: always()
    steps:
      - name: Check results
        run: |
          FAIL=0
          [ "${{ needs.test.result }}"  != "success" ] && echo "❌ Tests failed" && FAIL=1
          [ "${{ needs.e2e.result }}"   != "success" ] && echo "❌ E2E failed"   && FAIL=1
          [ "${{ needs.build.result }}" != "success" ] && echo "❌ Build failed" && FAIL=1
          [ "$FAIL" -eq 0 ] && echo "✅ All checks passed"
          exit $FAIL

      - name: PR status comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_BRANCH: ${{ github.head_ref }}
        with:
          script: |
            const r = s => s === 'success' ? '✅ Pass' : '❌ Fail';
            const branch = process.env.PR_BRANCH;
            const body = [
              '## CI Status',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Tests | ${r('${{ needs.test.result }}')} |`,
              `| E2E   | ${r('${{ needs.e2e.result }}')} |`,
              `| Build | ${r('${{ needs.build.result }}')} |`,
              '',
              `**Branch**: \`${branch}\`  **Commit**: ${context.payload.pull_request.head.sha.substring(0, 7)}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('## CI Status'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
